<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Number Scanner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #1a1a1a; min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding: 16px 16px 40px; }
  .header { margin-bottom: 16px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { font-size: 13px; color: #666; margin-top: 2px; }
  .camera-wrap { background: #111; border-radius: 14px; overflow: hidden; position: relative; width: 100%; aspect-ratio: 4/3; margin-bottom: 10px; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #canvas { display: none; }
  #preview { width: 100%; height: 100%; object-fit: contain; display: none; background: #000; }
  .guide-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 75%; height: 40%; border: 2px solid rgba(255,255,255,0.6); border-radius: 8px; pointer-events: none; }
  .cam-hint { position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; font-size: 11px; color: rgba(255,255,255,0.75); pointer-events: none; }
  .status { text-align: center; font-size: 13px; padding: 9px 12px; border-radius: 8px; margin-bottom: 10px; min-height: 36px; display: flex; align-items: center; justify-content: center; }
  .status.idle { background: #e8f4fd; color: #1a5f9e; }
  .status.scanning { background: #fff8e1; color: #b45309; }
  .status.success { background: #e8f5e9; color: #2e7d32; }
  .status.error { background: #fdecea; color: #c62828; }
  .progress { height: 4px; background: #ddd; border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
  .progress-bar { height: 100%; width: 0; background: #2563eb; border-radius: 2px; transition: width 0.3s; }
  .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
  button { cursor: pointer; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; padding: 12px 10px; transition: opacity 0.15s, transform 0.1s; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  #scanBtn { flex: 2; background: #2563eb; color: #fff; font-size: 15px; }
  #retakeBtn { flex: 1; background: #e5e7eb; color: #374151; display: none; }
  #clearBtn { flex: 1; background: #fee2e2; color: #991b1b; }
  #uploadBtn { width: 100%; background: #f3f4f6; color: #374151; border: 1.5px dashed #9ca3af; border-radius: 10px; padding: 11px; font-size: 13px; margin-bottom: 14px; }
  .section { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 14px; margin-bottom: 12px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .section-title { font-size: 14px; font-weight: 700; }
  .badge { background: #dbeafe; color: #1d4ed8; font-size: 12px; font-weight: 700; padding: 2px 10px; border-radius: 20px; }
  #chipWrap { display: flex; flex-wrap: wrap; gap: 8px; min-height: 38px; align-items: center; }
  .chip { background: #eff6ff; border: 1.5px solid #bfdbfe; color: #1e3a8a; font-size: 20px; font-weight: 800; font-family: monospace; padding: 6px 16px; border-radius: 8px; cursor: pointer; transition: background 0.1s; }
  .chip:active { background: #bfdbfe; }
  .chip.sel { background: #2563eb; color: #fff; border-color: #2563eb; }
  .empty { font-size: 13px; color: #9ca3af; }
  .export-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .exp-btn { background: #f9fafb; border: 1px solid #e5e7eb !important; border-radius: 10px; padding: 12px 8px; font-size: 13px; font-weight: 600; color: #374151; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .exp-icon { font-size: 22px; }
  #historyWrap { font-size: 13px; }
  .h-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f3f4f6; }
  .h-row:last-child { border-bottom: none; }
  .h-nums { font-family: monospace; font-weight: 700; color: #2563eb; font-size: 14px; }
  .h-time { color: #9ca3af; font-size: 11px; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 10px 22px; border-radius: 24px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📷 Number Scanner</h1>
    <p>Scan 3-digit numbers — export to Excel, Word, Sheets</p>
  </div>

  <div class="camera-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <img id="preview" alt="captured">
    <div class="guide-box"></div>
    <div class="cam-hint">Aim numbers at the box — tap Scan</div>
  </div>

  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div class="status idle" id="statusEl">Starting camera…</div>

  <div class="btn-row">
    <button id="scanBtn" disabled onclick="doScan()">📷 Scan Now</button>
    <button id="retakeBtn" onclick="retake()">🔄 Retake</button>
    <button id="clearBtn" onclick="clearAll()">🗑 Clear</button>
  </div>
  <button id="uploadBtn" onclick="triggerUpload()">📁 Upload photo from gallery instead</button>

  <div class="section">
    <div class="section-header">
      <span class="section-title">Scanned Numbers</span>
      <span class="badge" id="badge">0</span>
    </div>
    <div id="chipWrap"><span class="empty">No numbers yet — tap Scan</span></div>
  </div>

  <div class="section">
    <div class="section-title" style="margin-bottom:10px">Export</div>
    <div class="export-grid">
      <button class="exp-btn" onclick="exportCSV()"><span class="exp-icon">📊</span>Excel / CSV</button>
      <button class="exp-btn" onclick="exportTXT()"><span class="exp-icon">📝</span>Word (.txt)</button>
      <button class="exp-btn" onclick="copySheets()"><span class="exp-icon">📋</span>Copy for Sheets</button>
      <button class="exp-btn" onclick="exportJSON()"><span class="exp-icon">📦</span>JSON</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title" style="margin-bottom:10px">Scan History</div>
    <div id="historyWrap"><span class="empty">No history yet</span></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var video = document.getElementById('video');
var canvas = document.getElementById('canvas');
var preview = document.getElementById('preview');
var scanBtn = document.getElementById('scanBtn');
var retakeBtn = document.getElementById('retakeBtn');
var statusEl = document.getElementById('statusEl');
var progressBar = document.getElementById('progressBar');
var chipWrap = document.getElementById('chipWrap');
var badge = document.getElementById('badge');
var historyWrap = document.getElementById('historyWrap');

var numbers = [];
var scanHistory = [];
var scanning = false;

function setStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = 'status ' + (type || 'idle');
}
function setProgress(pct) { progressBar.style.width = pct + '%'; }

function initCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setStatus('Camera not supported — use Upload instead', 'error');
    return;
  }
  navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } })
    .then(function(stream) {
      video.srcObject = stream;
      video.onloadedmetadata = function() {
        setStatus('Camera ready — tap Scan Now!', 'idle');
        scanBtn.disabled = false;
      };
    })
    .catch(function(e) {
      setStatus('Camera blocked — use Upload instead', 'error');
    });
}

function doScan() {
  if (scanning) return;
  var ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  ctx.drawImage(video, 0, 0);
  var dataURL = canvas.toDataURL('image/jpeg', 0.92);
  showCaptured(dataURL);
  runOCR(dataURL);
}

function showCaptured(dataURL) {
  preview.src = dataURL;
  preview.style.display = 'block';
  video.style.display = 'none';
  retakeBtn.style.display = '';
  scanBtn.style.display = 'none';
}

function retake() {
  preview.style.display = 'none';
  video.style.display = 'block';
  retakeBtn.style.display = 'none';
  scanBtn.style.display = '';
  setStatus('Camera ready — tap Scan Now!', 'idle');
  setProgress(0);
}

function triggerUpload() {
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      showCaptured(ev.target.result);
      runOCR(ev.target.result);
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function loadTesseract(cb) {
  if (typeof Tesseract !== 'undefined') { cb(); return; }
  setStatus('Loading OCR engine (first time only)…', 'scanning');
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js';
  s.onload = cb;
  s.onerror = function() {
    var s2 = document.createElement('script');
    s2.src = 'https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js';
    s2.onload = cb;
    s2.onerror = function() {
      setStatus('Failed to load OCR. Check internet connection.', 'error');
      scanning = false;
    };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
}

function runOCR(dataURL) {
  if (scanning) return;
  scanning = true;
  setStatus('Preparing OCR…', 'scanning');
  setProgress(5);

  loadTesseract(function() {
    setStatus('Recognizing numbers…', 'scanning');
    setProgress(20);

    Tesseract.recognize(dataURL, 'eng', {
      logger: function(m) {
        if (m.status === 'recognizing text') {
          setProgress(20 + Math.round(m.progress * 70));
        }
      }
    }).then(function(result) {
      setProgress(95);
      var text = result.data.text;
      var found = extractNumbers(text);

      if (found.length === 0) {
        setStatus('No 3-digit numbers found. Try clearer image or better lighting.', 'error');
      } else {
        var added = 0;
        found.forEach(function(n) {
          if (!numbers.includes(n)) { numbers.push(n); added++; }
        });
        setStatus('Found ' + found.length + ' number(s) — ' + added + ' new!', 'success');
        addHistory(found);
        renderChips();
      }
      setProgress(100);
      setTimeout(function() { setProgress(0); }, 1500);
      scanning = false;

    }).catch(function(err) {
      console.error('OCR error:', err);
      setStatus('OCR error: ' + (err.message || String(err)), 'error');
      setProgress(0);
      scanning = false;
    });
  });
}

function extractNumbers(text) {
  var matches = text.match(/\b\d{3}\b/g) || [];
  var seen = {};
  var unique = [];
  matches.forEach(function(n) { if (!seen[n]) { seen[n] = true; unique.push(n); } });
  return unique;
}

function renderChips() {
  badge.textContent = numbers.length;
  if (numbers.length === 0) {
    chipWrap.innerHTML = '<span class="empty">No numbers yet — tap Scan</span>';
    return;
  }
  chipWrap.innerHTML = '';
  numbers.forEach(function(n) {
    var c = document.createElement('div');
    c.className = 'chip';
    c.textContent = n;
    c.onclick = function() {
      c.classList.toggle('sel');
      navigator.clipboard && navigator.clipboard.writeText(n).catch(function(){});
      showToast('Copied: ' + n);
    };
    chipWrap.appendChild(c);
  });
}

function addHistory(nums) {
  var time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  scanHistory.unshift({ nums: nums.slice(), time: time });
  if (scanHistory.length > 15) scanHistory.pop();
  historyWrap.innerHTML = '';
  scanHistory.forEach(function(h) {
    var row = document.createElement('div');
    row.className = 'h-row';
    row.innerHTML = '<span class="h-nums">' + h.nums.join(' · ') + '</span><span class="h-time">' + h.time + '</span>';
    historyWrap.appendChild(row);
  });
}

function clearAll() {
  numbers = [];
  renderChips();
  showToast('Cleared');
  setStatus('Cleared — ready to scan!', 'idle');
}

function dl(name, content, type) {
  var blob = new Blob([content], { type: type });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}

function exportCSV() {
  if (!numbers.length) { showToast('No numbers yet'); return; }
  var rows = ['No,Number,Date'];
  numbers.forEach(function(n, i) { rows.push((i+1) + ',' + n + ',' + new Date().toLocaleDateString()); });
  dl('numbers.csv', rows.join('\n'), 'text/csv');
  showToast('CSV saved — open in Excel!');
}

function exportTXT() {
  if (!numbers.length) { showToast('No numbers yet'); return; }
  var lines = ['SCANNED NUMBERS', '====================', ''].concat(numbers).concat(['', 'Total: ' + numbers.length, 'Date: ' + new Date().toLocaleString()]);
  dl('numbers.txt', lines.join('\n'), 'text/plain');
  showToast('TXT saved — open in Word!');
}

function copySheets() {
  if (!numbers.length) { showToast('No numbers yet'); return; }
  var text = numbers.join('\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() { showToast('Copied! Paste into Google Sheets'); }).catch(fallbackCopy);
  } else { fallbackCopy(); }
  function fallbackCopy() {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Copied! Paste into Google Sheets');
  }
}

function exportJSON() {
  if (!numbers.length) { showToast('No numbers yet'); return; }
  var obj = { numbers: numbers, count: numbers.length, exported: new Date().toISOString() };
  dl('numbers.json', JSON.stringify(obj, null, 2), 'application/json');
  showToast('JSON saved!');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

initCamera();
</script>
</body>
</html>
