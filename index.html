<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Number Scanner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #1a1a1a; min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding: 16px 16px 40px; }
  .header { margin-bottom: 16px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { font-size: 13px; color: #666; margin-top: 2px; }

  /* Camera */
  .camera-wrap {
    background: #111;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    margin-bottom: 10px;
  }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #canvas { display: none; }

  /* Scan guide overlay — darkens outside the box */
  .overlay-top, .overlay-bottom, .overlay-left, .overlay-right {
    position: absolute;
    background: rgba(0,0,0,0.45);
    pointer-events: none;
  }
  /* These 4 divs form a "hole" in the middle */
  .overlay-top    { top: 0; left: 0; right: 0; height: 30%; }
  .overlay-bottom { bottom: 0; left: 0; right: 0; height: 30%; }
  .overlay-left   { top: 30%; bottom: 30%; left: 0; width: 12.5%; }
  .overlay-right  { top: 30%; bottom: 30%; right: 0; width: 12.5%; }

  /* Guide box border */
  .guide-box {
    position: absolute;
    top: 30%; left: 12.5%;
    width: 75%; height: 40%;
    border: 2px solid #4aaeff;
    border-radius: 8px;
    pointer-events: none;
  }
  /* Corner accents */
  .guide-box::before, .guide-box::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border-color: #fff;
    border-style: solid;
  }
  .guide-box::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .guide-box::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

  .scan-flash {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0);
    pointer-events: none;
    border-radius: 14px;
    transition: background 0.1s;
  }
  .scan-flash.flash { background: rgba(255,255,255,0.5); }

  .cam-hint {
    position: absolute; bottom: 10px; left: 0; right: 0;
    text-align: center; font-size: 11px;
    color: rgba(255,255,255,0.85);
    pointer-events: none;
  }

  /* Status */
  .status { text-align: center; font-size: 13px; padding: 9px 12px; border-radius: 8px; margin-bottom: 10px; min-height: 36px; display: flex; align-items: center; justify-content: center; }
  .status.idle     { background: #e8f4fd; color: #1a5f9e; }
  .status.scanning { background: #fff8e1; color: #b45309; }
  .status.success  { background: #e8f5e9; color: #2e7d32; }
  .status.error    { background: #fdecea; color: #c62828; }

  .progress { height: 4px; background: #ddd; border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
  .progress-bar { height: 100%; width: 0; background: #2563eb; border-radius: 2px; transition: width 0.3s; }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
  button { cursor: pointer; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; padding: 12px 10px; transition: opacity 0.15s, transform 0.1s; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  #scanBtn  { flex: 2; background: #2563eb; color: #fff; font-size: 15px; }
  #clearBtn { flex: 1; background: #fee2e2; color: #991b1b; }
  #uploadBtn { width: 100%; background: #f3f4f6; color: #374151; border: 1.5px dashed #9ca3af; border-radius: 10px; padding: 11px; font-size: 13px; margin-bottom: 14px; }

  /* Results */
  .section { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 14px; margin-bottom: 12px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .section-title { font-size: 14px; font-weight: 700; }
  .badge { background: #dbeafe; color: #1d4ed8; font-size: 12px; font-weight: 700; padding: 2px 10px; border-radius: 20px; }
  #chipWrap { display: flex; flex-wrap: wrap; gap: 8px; min-height: 38px; align-items: center; }
  .chip { background: #eff6ff; border: 1.5px solid #bfdbfe; color: #1e3a8a; font-size: 20px; font-weight: 800; font-family: monospace; padding: 6px 16px; border-radius: 8px; cursor: pointer; }
  .chip:active { background: #bfdbfe; }
  .chip.sel { background: #2563eb; color: #fff; border-color: #2563eb; }
  .empty { font-size: 13px; color: #9ca3af; }

  /* Export */
  .export-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .exp-btn { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px 8px; font-size: 13px; font-weight: 600; color: #374151; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .exp-icon { font-size: 22px; }

  /* History */
  .h-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f3f4f6; }
  .h-row:last-child { border-bottom: none; }
  .h-nums { font-family: monospace; font-weight: 700; color: #2563eb; font-size: 14px; }
  .h-time { color: #9ca3af; font-size: 11px; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 10px 22px; border-radius: 24px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📷 Number Scanner</h1>
    <p>Hanya angka di dalam kotak biru yang akan dideteksi</p>
  </div>

  <div class="camera-wrap" id="cameraWrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <!-- Dark overlay outside guide box -->
    <div class="overlay-top"></div>
    <div class="overlay-bottom"></div>
    <div class="overlay-left"></div>
    <div class="overlay-right"></div>

    <!-- Guide box border -->
    <div class="guide-box"></div>
    <div class="scan-flash" id="scanFlash"></div>
    <div class="cam-hint">📦 Letakkan angka 3 digit di dalam kotak biru</div>
  </div>

  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div class="status idle" id="statusEl">Memulai kamera…</div>

  <div class="btn-row">
    <button id="scanBtn" disabled onclick="doScan()">📷 Scan</button>
    <button id="clearBtn" onclick="clearAll()">🗑 Hapus</button>
  </div>
  <button id="uploadBtn" onclick="triggerUpload()">📁 Upload foto dari galeri</button>

  <div class="section">
    <div class="section-header">
      <span class="section-title">Angka Terdeteksi</span>
      <span class="badge" id="badge">0</span>
    </div>
    <div id="chipWrap"><span class="empty">Belum ada — tap Scan</span></div>
  </div>

  <div class="section">
    <div class="section-title" style="margin-bottom:10px">Export</div>
    <div class="export-grid">
      <button class="exp-btn" onclick="exportCSV()"><span class="exp-icon">📊</span>Excel / CSV</button>
      <button class="exp-btn" onclick="exportTXT()"><span class="exp-icon">📝</span>Word (.txt)</button>
      <button class="exp-btn" onclick="copySheets()"><span class="exp-icon">📋</span>Copy for Sheets</button>
      <button class="exp-btn" onclick="exportJSON()"><span class="exp-icon">📦</span>JSON</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title" style="margin-bottom:10px">Riwayat Scan</div>
    <div id="historyWrap"><span class="empty">Belum ada riwayat</span></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var video       = document.getElementById('video');
var canvas      = document.getElementById('canvas');
var scanBtn     = document.getElementById('scanBtn');
var statusEl    = document.getElementById('statusEl');
var progressBar = document.getElementById('progressBar');
var chipWrap    = document.getElementById('chipWrap');
var badge       = document.getElementById('badge');
var historyWrap = document.getElementById('historyWrap');
var scanFlash   = document.getElementById('scanFlash');
var cameraWrap  = document.getElementById('cameraWrap');

var numbers     = [];
var scanHistory = [];
var scanning    = false;

// Guide box dimensions (must match CSS: top 30%, left 12.5%, w 75%, h 40%)
var GUIDE = { top: 0.30, left: 0.125, width: 0.75, height: 0.40 };

function setStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = 'status ' + (type || 'idle');
}
function setProgress(pct) { progressBar.style.width = pct + '%'; }

// ── Camera ──────────────────────────────────────────────
function initCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setStatus('Kamera tidak didukung — gunakan Upload', 'error');
    return;
  }
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }
  }).then(function(stream) {
    video.srcObject = stream;
    video.onloadedmetadata = function() {
      setStatus('Kamera siap — arahkan angka ke kotak, tap Scan!', 'idle');
      scanBtn.disabled = false;
    };
  }).catch(function() {
    setStatus('Kamera diblokir — gunakan Upload', 'error');
  });
}

// ── Capture: crop only guide-box area ───────────────────
function captureGuideArea() {
  var vw = video.videoWidth  || 640;
  var vh = video.videoHeight || 480;

  // Pixel coords of the guide box inside the actual video frame
  var cx = Math.round(GUIDE.left   * vw);
  var cy = Math.round(GUIDE.top    * vh);
  var cw = Math.round(GUIDE.width  * vw);
  var ch = Math.round(GUIDE.height * vh);

  // Draw only that region onto the canvas
  canvas.width  = cw;
  canvas.height = ch;
  var ctx = canvas.getContext('2d');
  ctx.drawImage(video, cx, cy, cw, ch, 0, 0, cw, ch);

  return canvas.toDataURL('image/jpeg', 0.95);
}

// ── Flash effect ─────────────────────────────────────────
function flashEffect() {
  scanFlash.classList.add('flash');
  setTimeout(function() { scanFlash.classList.remove('flash'); }, 150);
}

// ── Main scan ─────────────────────────────────────────────
function doScan() {
  if (scanning) return;
  flashEffect();
  var dataURL = captureGuideArea();
  runOCR(dataURL);
}

function triggerUpload() {
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      // For uploaded images, crop the same guide-box region
      var img = new Image();
      img.onload = function() {
        var vw = img.width, vh = img.height;
        var cx = Math.round(GUIDE.left * vw);
        var cy = Math.round(GUIDE.top * vh);
        var cw = Math.round(GUIDE.width * vw);
        var ch = Math.round(GUIDE.height * vh);
        canvas.width = cw; canvas.height = ch;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, cx, cy, cw, ch, 0, 0, cw, ch);
        runOCR(canvas.toDataURL('image/jpeg', 0.95));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

// ── OCR ──────────────────────────────────────────────────
function loadTesseract(cb) {
  if (typeof Tesseract !== 'undefined') { cb(); return; }
  setStatus('Memuat OCR engine (pertama kali saja)…', 'scanning');
  function tryLoad(src, fallbackSrc) {
    var s = document.createElement('script');
    s.src = src;
    s.onload = cb;
    s.onerror = function() {
      if (fallbackSrc) {
        var s2 = document.createElement('script');
        s2.src = fallbackSrc;
        s2.onload = cb;
        s2.onerror = function() {
          setStatus('Gagal memuat OCR. Periksa koneksi internet.', 'error');
          scanning = false;
        };
        document.head.appendChild(s2);
      }
    };
    document.head.appendChild(s);
  }
  tryLoad(
    'https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js',
    'https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js'
  );
}

function runOCR(dataURL) {
  if (scanning) return;
  scanning = true;
  scanBtn.disabled = true;
  setStatus('Memproses…', 'scanning');
  setProgress(5);

  loadTesseract(function() {
    setProgress(20);

    Tesseract.recognize(dataURL, 'eng', {
      logger: function(m) {
        if (m.status === 'recognizing text') {
          setProgress(20 + Math.round(m.progress * 70));
        }
      }
    }).then(function(result) {
      setProgress(98);
      var text = result.data.text;
      var found = extractNumbers(text);

      if (found.length === 0) {
        setStatus('❌ Angka 3 digit tidak ditemukan. Coba lagi.', 'error');
      } else {
        var added = 0;
        found.forEach(function(n) {
          if (!numbers.includes(n)) { numbers.push(n); added++; }
        });
        setStatus('✅ Ditemukan ' + found.length + ' angka — ' + added + ' baru ditambahkan!', 'success');
        addHistory(found);
        renderChips();
      }

      setProgress(100);
      setTimeout(function() { setProgress(0); }, 1200);

      // ✅ Kamera kembali otomatis setelah scan selesai
      resetToCamera();

    }).catch(function(err) {
      console.error(err);
      setStatus('OCR error: ' + (err.message || String(err)), 'error');
      setProgress(0);
      resetToCamera();
    });
  });
}

// ── Reset camera (no retake button needed) ───────────────
function resetToCamera() {
  scanning = false;
  scanBtn.disabled = false;
  // Camera video is always visible — nothing to toggle
}

// ── Extract only 3-digit numbers ────────────────────────
function extractNumbers(text) {
  // Match standalone 3-digit numbers only (not part of longer numbers)
  var matches = text.match(/(?<!\d)\d{3}(?!\d)/g) || [];
  var seen = {}, unique = [];
  matches.forEach(function(n) { if (!seen[n]) { seen[n] = true; unique.push(n); } });
  return unique;
}

// ── Render ───────────────────────────────────────────────
function renderChips() {
  badge.textContent = numbers.length;
  if (numbers.length === 0) {
    chipWrap.innerHTML = '<span class="empty">Belum ada — tap Scan</span>';
    return;
  }
  chipWrap.innerHTML = '';
  numbers.forEach(function(n) {
    var c = document.createElement('div');
    c.className = 'chip';
    c.textContent = n;
    c.onclick = function() {
      c.classList.toggle('sel');
      if (navigator.clipboard) navigator.clipboard.writeText(n).catch(function(){});
      showToast('Disalin: ' + n);
    };
    chipWrap.appendChild(c);
  });
}

function addHistory(nums) {
  var time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  scanHistory.unshift({ nums: nums.slice(), time: time });
  if (scanHistory.length > 20) scanHistory.pop();
  historyWrap.innerHTML = '';
  scanHistory.forEach(function(h) {
    var row = document.createElement('div');
    row.className = 'h-row';
    row.innerHTML = '<span class="h-nums">' + h.nums.join(' · ') + '</span><span class="h-time">' + h.time + '</span>';
    historyWrap.appendChild(row);
  });
}

function clearAll() {
  numbers = [];
  renderChips();
  setStatus('Data dihapus — siap scan!', 'idle');
  showToast('Data dihapus');
}

// ── Export ───────────────────────────────────────────────
function dl(name, content, type) {
  var blob = new Blob([content], { type: type });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name; a.click();
}

function exportCSV() {
  if (!numbers.length) { showToast('Belum ada angka'); return; }
  var rows = ['No,Angka,Tanggal'];
  numbers.forEach(function(n, i) { rows.push((i+1)+','+n+','+new Date().toLocaleDateString()); });
  dl('angka.csv', rows.join('\n'), 'text/csv');
  showToast('CSV disimpan — buka di Excel!');
}

function exportTXT() {
  if (!numbers.length) { showToast('Belum ada angka'); return; }
  var lines = ['ANGKA HASIL SCAN','====================',''].concat(numbers).concat(['','Total: '+numbers.length,'Tanggal: '+new Date().toLocaleString()]);
  dl('angka.txt', lines.join('\n'), 'text/plain');
  showToast('TXT disimpan — buka di Word!');
}

function copySheets() {
  if (!numbers.length) { showToast('Belum ada angka'); return; }
  var text = numbers.join('\n');
  function fb() {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Disalin! Paste ke Google Sheets');
  }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function(){ showToast('Disalin! Paste ke Google Sheets'); }).catch(fb);
  } else { fb(); }
}

function exportJSON() {
  if (!numbers.length) { showToast('Belum ada angka'); return; }
  dl('angka.json', JSON.stringify({ numbers: numbers, count: numbers.length, exported: new Date().toISOString() }, null, 2), 'application/json');
  showToast('JSON disimpan!');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

initCamera();
</script>
</body>
</html>
